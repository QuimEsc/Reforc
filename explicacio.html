<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101942">
  <meta name="description" content="Pissarra matemàtica per a explicacions de classe">
  <title>Explicació · Missió Mates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=3">
  <link rel="stylesheet" href="explicacio.css?v=1">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']],
        processEscapes: true
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] },
      chtml: { scale: 1.12 }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer src="math-render.js?v=3"></script>
  <script defer src="explicacio.js?v=1"></script>
</head>
<body class="explanation-body theme-space">
  <div class="world" aria-hidden="true">
    <span class="star star-a"></span>
    <span class="star star-b"></span>
    <span class="star star-c"></span>
    <span class="planet planet-a"></span>
  </div>

  <main class="explanation-shell">
    <header class="explanation-header">
      <a class="brand" href="seguiment.html" aria-label="Tornar al seguiment">
        <span class="brand-mark" aria-hidden="true">∑</span>
        <span><strong>Pissarra d’explicacions</strong><small>Missió Mates</small></span>
      </a>
      <div class="explanation-actions">
        <button id="decreaseTextButton" class="teacher-link" type="button" aria-label="Reduir la grandària">A−</button>
        <button id="increaseTextButton" class="teacher-link" type="button" aria-label="Augmentar la grandària">A+</button>
        <button id="fullscreenButton" class="teacher-link" type="button">Pantalla completa</button>
        <a class="teacher-link" href="seguiment.html">Tornar al seguiment</a>
      </div>
    </header>

    <section class="explanation-workspace" aria-label="Pissarra matemàtica">
      <article class="explanation-preview game-card">
        <div class="preview-heading">
          <span>EXPLICACIÓ PER A LA CLASSE</span>
          <span id="renderStatus" role="status" aria-live="polite">Preparada</span>
        </div>
        <div id="explanationOutput" class="explanation-output math-content">
          <p class="explanation-placeholder">Escriu l’explicació en el quadre inferior.</p>
        </div>
      </article>

      <section class="explanation-editor game-card">
        <div class="editor-heading">
          <label for="explanationInput">Text pla</label>
          <button id="clearExplanationButton" class="mini-button" type="button">Netejar</button>
        </div>
        <textarea id="explanationInput" rows="7" maxlength="30000" spellcheck="false" placeholder="Exemple:&#10;Per sumar fraccions necessitem el mateix denominador.&#10;5/3 + 2/3 = 7/3&#10;mat(1,2,3;4,5,6)"></textarea>
        <div class="shortcut-strip" aria-label="Dreceres matemàtiques">
          <span><code>5/3</code> fracció</span>
          <span><code>sqrt(9)</code> arrel</span>
          <span><code>mat(1,2;3,4)</code> matriu</span>
          <span><code>det(1,2;3,4)</code> determinant</span>
          <span><code>sis(x+y=3;2x-y=1)</code> sistema</span>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
